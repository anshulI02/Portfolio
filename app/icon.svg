<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0F1923"/>

  <!-- Chip body -->
  <rect x="10" y="10" width="12" height="12" rx="2" fill="none" stroke="#22D3EE" stroke-width="1.5"/>

  <!-- Top pins -->
  <line x1="13" y1="10" x2="13" y2="7" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="10" x2="19" y2="7" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="13" y1="22" x2="13" y2="25" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="22" x2="19" y2="25" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="10" y1="13" x2="7" y2="13" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="19" x2="7" y2="19" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="22" y1="13" x2="25" y2="13" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="19" x2="25" y2="19" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#22D3EE"/>
</svg>
